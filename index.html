<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#101820" />
    <title>Hứng Điểm Bằng Tay</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="game-shell" aria-label="Hứng điểm bằng tay">
        <video id="camera" playsinline muted autoplay></video>
        <canvas id="game" aria-label="Game canvas"></canvas>

        <div class="topbar">
          <div>
            <span class="label">Điểm</span>
            <strong id="score">0</strong>
          </div>
          <div>
            <span class="label">Thời gian</span>
            <strong id="time">60</strong>
          </div>
          <div>
            <span class="label">Kỷ lục</span>
            <strong id="best">0</strong>
          </div>
        </div>

        <div class="status" id="status">Nhấn Bắt đầu để cấp quyền camera</div>

        <section class="panel" id="panel">
          <h1>Hứng Điểm</h1>
          <p>Dùng bàn tay trước camera để điều khiển vùng sáng và hứng các điểm rơi.</p>
          <button id="startButton" type="button" onclick="window.startHandCatchGame && window.startHandCatchGame(event)">Bắt đầu</button>
          <button id="switchButton" type="button" class="secondary" onclick="window.switchHandCatchCamera && window.switchHandCatchCamera(event)">Đổi camera</button>
          <p class="hint">Cần HTTPS khi test trên điện thoại. Localhost vẫn được hỗ trợ trên máy tính.</p>
        </section>
      </section>
    </main>

    <script>
      window.HAND_CATCH_VERSION = "v5";
      document.addEventListener("DOMContentLoaded", function () {
        var status = document.querySelector("#status");
        if (status) status.textContent = "Nhấn Bắt đầu để cấp quyền camera";
      });
    </script>
    <script src="./src/main.js?v=5"></script>
  </body>
</html>
